name: ci-workflow.yml

on:
  pull_request:
    branches:
      - dev
      - main

jobs:

  code-test:
    name: 코드 테스트
    runs-on: ubuntu-latest

    steps:

      - name : 브랜치로 체크아웃
        uses : actions/checkout@v6

      - name : JDK 설치
        uses : actions/setup-java@v5
        with :
          distribution: 'temurin'
          java-version: '25'

      - name : gradlew 권한 세팅
        run : chmod +X ./gradlew

      - name : 테스트 실행
        run : ./gradlew test --no-daemon

